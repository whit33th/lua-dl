appId: com.luadl.desktop
productName: lua-dl
directories:
  output: release
asar: true
asarUnpack:
  - node_modules/node-pty/**/*
files:
  - out/**/*
  - dist-electron/**/*
  - package.json
extraResources:
  - from: resources/bin
    to: bin
publish:
  provider: github
  owner: whit33th
  repo: lua-dl
  releaseType: release

win:
  icon: build/icon.ico
  target:
    - nsis
  artifactName: ${productName}-${version}-${arch}.${ext}

nsis:
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: false
  deleteAppDataOnUninstall: false
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  uninstallDisplayName: lua-dl
