name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    # Pure Go, no CGo — cross-compile from Linux for speed/cost.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          check-latest: true

      - name: Build Windows exe
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: '0'
          RYUU_AUTH_CODE: ${{ secrets.RYUU_AUTH_CODE }}
        run: |
          if [ -z "$RYUU_AUTH_CODE" ]; then
            echo "::error::RYUU_AUTH_CODE secret is not set on this repo"
            exit 1
          fi
          # XOR + hex obfuscate the auth code so it doesn't appear as a plain
          # string in the binary. Deobfuscation mirror lives in internal/ryuu.
          OBFUSCATED=$(RYUU_AUTH_CODE="$RYUU_AUTH_CODE" python3 -c '
          import os
          key = b"lua-dl/v1/ryuu-auth-xor-key"
          data = os.environ["RYUU_AUTH_CODE"].encode()
          print(bytes(b ^ key[i % len(key)] for i, b in enumerate(data)).hex())
          ')
          go build -trimpath \
            -ldflags="-s -w -X github.com/hoangvu12/lua-dl/internal/ryuu.obfuscatedAuthCode=$OBFUSCATED" \
            -o lua-dl.exe ./cmd/lua-dl
          ls -la lua-dl.exe

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: lua-dl.exe
          generate_release_notes: true
          fail_on_unmatched_files: true
